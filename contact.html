    <link rel="stylesheet" href="index.css">
<section id="contact">
    <h2>Contact Us</h2>
    <p>📞 (555) 123-4567</p>
    <p>📧 info@hvacpro.com</p>
</section>
    <section id="hours">
    <h3>Business Hours</h3>
    <ul>
        <li>Monday - Friday: 8:00 AM - 6:00 PM</li>
        <li>Saturday: 9:00 AM - 3:00 PM</li>
        <li>Sunday: Closed</li>
    </ul>
</section>
<div class="emergency-banner">
    🚨 24/7 Emergency Service - Call Now: (555) 123-4567
</div>
<script>
    // Wait for HTML to load before running
    document.addEventListener('DOMContentLoaded', function() {
        // Simple script to highlight today's hours
        const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        const today = days[new Date().getDay()];
        const hoursList = document.querySelectorAll('#hours li');
        
        if (hoursList.length > 0) {
            hoursList.forEach(li => {
                if (li.textContent.includes(today)) {
                    li.classList.add('today');
                }
            });
        } else {
            console.log('Hours list not found on this page');
        }
    });
</script>
